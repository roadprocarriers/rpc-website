<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Driver Portal Login — Road Pro Carriers LLC">
  <title>Driver Login | Road Pro Carriers LLC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; display: flex; flex-direction: column; }
    .portal-header { background: #0F2D72; padding: 0 24px; height: 70px; display: flex; align-items: center; flex-shrink: 0; }
    .portal-header a { display: flex; align-items: center; }
    .portal-header img { height: 44px; width: auto; }
    .login-main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .login-card { background: #FFFFFF; border-radius: 14px; box-shadow: 0 6px 32px rgba(15,45,114,0.12); padding: 48px 40px 40px; width: 100%; max-width: 420px; text-align: center; }
    .login-card .logo-wrap { margin-bottom: 28px; }
    .login-card .logo-wrap img { height: 52px; width: auto; margin: 0 auto; }
    .login-card h1 { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 26px; color: #0F2D72; margin-bottom: 6px; }
    .login-card .subtitle { font-size: 15px; color: #666; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; text-align: left; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; font-family: 'Poppins', sans-serif; }
    .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #dde3ed; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 15px; color: #333; background: #fafbfd; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .form-group input:focus { border-color: #2BC4A4; box-shadow: 0 0 0 3px rgba(43,196,164,0.15); background: #fff; }
    .error-msg { background: #fff0ed; border: 1px solid #f7b8a4; color: #b94000; border-radius: 8px; padding: 10px 14px; font-size: 13.5px; margin-bottom: 16px; text-align: left; display: none; }
    .error-msg.visible { display: block; }
    .btn-signin { width: 100%; padding: 14px; background: #2BC4A4; color: #fff; border: none; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 16px; cursor: pointer; transition: background 0.25s; margin-top: 6px; }
    .btn-signin:hover { background: #24a88c; }
    .btn-signin:disabled { background: #9eddd2; cursor: not-allowed; }
    .help-text { margin-top: 22px; font-size: 13.5px; color: #777; }
    .help-text a { color: #0F2D72; font-weight: 500; }
    .help-text a:hover { text-decoration: underline; }
    .portal-footer { background: #0F2D72; color: rgba(255,255,255,0.55); text-align: center; font-size: 13px; padding: 16px 24px; flex-shrink: 0; }
    @media (max-width: 480px) { .login-card { padding: 36px 24px 32px; } }
  .footer-social{display:flex;justify-content:center;gap:16px;margin-bottom:10px}.footer-social a{color:#fff;display:inline-flex;transition:color 0.3s ease}.footer-social a:hover{color:#2BC4A4}</style>
</head>
<body>
  <header class="portal-header">
    <a href="https://www.roadprocarriers.com"><img src="images/logo.png" alt="Road Pro Carriers LLC"></a>
  </header>
  <main class="login-main">
    <div class="login-card">
      <div class="logo-wrap"><img src="images/logo.png" alt="Road Pro Carriers LLC"></div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your driver portal</p>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-signin" id="signInBtn">Sign In</button>
      </form>
      <p class="help-text">Having trouble signing in?&nbsp;<a href="mailto:HR@roadprocarriers.com">Contact HR@roadprocarriers.com</a></p>
    </div>
  </main>

  <script>
    const { createClient } = supabase;
    const sb = createClient('https://rfeakhvcjuidsgrjfubn.supabase.co', 'sb_publishable_reHNLmo12w1HfOlDQW3ZbQ_5eqN5hN_');
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'driver-dashboard.html';
    })();
    const form = document.getElementById('loginForm');
    const emailEl = document.getElementById('email');
    const passEl = document.getElementById('password');
    const btn = document.getElementById('signInBtn');
    const errorMsg = document.getElementById('errorMsg');
    function showError(msg) { errorMsg.textContent = msg; errorMsg.classList.add('visible'); }
    function clearError() { errorMsg.textContent = ''; errorMsg.classList.remove('visible'); }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();
      const email = emailEl.value.trim();
      const password = passEl.value;
      if (!email || !password) { showError('Please enter your email and password.'); return; }
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { showError(error.message || 'Sign-in failed. Please try again.'); btn.disabled = false; btn.textContent = 'Sign In'; return; }
      window.location.href = 'driver-dashboard.html';
    });
  </script>
</body>
</html>
